name: Build and Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/app/release-keystore.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/app/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            -PAPP_VERSION_CODE=${{ github.run_number }} \
            -PAPP_VERSION_NAME=v${{ github.run_number }} \
            -PGITHUB_OWNER=${{ github.repository_owner }} \
            -PGITHUB_REPO=${{ github.event.repository.name }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk WannUndWo-v${{ github.run_number }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: WannUndWo v${{ github.run_number }}
          generate_release_notes: true
          files: WannUndWo-v${{ github.run_number }}.apk
